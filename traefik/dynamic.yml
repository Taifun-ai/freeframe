# ============================================================
# Traefik Dynamic Configuration — Static SSL Certificates
# ============================================================
# This file configures Traefik to use pre-existing SSL certificates
# from the ./certs folder for spotico.taifun.ai domain

tls:
  certificates:
    - certFile: /certs/fullchain.pem
      keyFile: /certs/privateKey.txt
      stores:
        default: {}
  stores:
    default:
      defaultCertificate:
        certFile: /certs/fullchain.pem
        keyFile: /certs/privateKey.txt
  # Set minimum TLS version for better security
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true

# HTTP configuration with CORS headers
http:
  middlewares:
    # CORS headers for API
    cors-headers:
      headers:
        accessControlAllowOrigins:
          - "https://spotico.taifun.ai"
          - "http://localhost:3000"
        accessControlAllowMethods:
          - "GET"
          - "POST"
          - "PUT"
          - "DELETE"
          - "PATCH"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "*"
        accessControlExposeHeaders:
          - "Content-Length"
          - "X-Total-Count"
        accessControlMaxAge: 86400
        accessControlAllowCredentials: true

    # Redirect HTTP to HTTPS
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true

# ============================================================
# Traefik Dynamic Configuration — Static SSL Certificates
# ============================================================
# This file configures Traefik to use pre-existing SSL certificates
# from the ./certs folder for spotico.taifun.ai domain

tls:
  certificates:
    - certFile: /certs/fullchain.pem
      keyFile: /certs/privateKey.txt
      stores:
        default: {}
  stores:
    default:
      defaultCertificate:
        certFile: /certs/fullchain.pem
        keyFile: /certs/privateKey.txt
  # Set minimum TLS version for better security
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true

# NOTE: CORS configuration is provided via Docker labels (docker-compose.prod.yml)
# to avoid conflicts between the file provider and Docker provider. Keep this
# file limited to TLS certificates and optional global settings.

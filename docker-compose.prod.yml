# ============================================================
# FreeFrame — Production Docker Compose
# ============================================================
# Usage:
#   cp .env.example .env.prod        # configure your settings
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# SSL: Uses pre-existing certificates from ./certs folder
#      Traefik will serve SSL/TLS automatically
# ============================================================

services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Use static certificates instead of Let's Encrypt
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./certs:/certs:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-freeframe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes;
      else
        redis-server --appendonly yes;
      fi"
    env_file:
      - .env.prod
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping || redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      MINIO_CORS_ALLOW_ORIGIN: ${FRONTEND_URL:-http://localhost:3000}
      MINIO_CORS_ALLOW_METHODS: GET,PUT,POST,DELETE,HEAD
      MINIO_CORS_ALLOW_HEADERS: "*"
      MINIO_CORS_EXPOSE_HEADERS: ETag,Content-Length,x-amz-request-id
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      - traefik.enable=false

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-freeframe};
      mc anonymous set download local/${S3_BUCKET:-freeframe};
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - .env.prod
    environment:
      - DISABLE_DOCS=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-freeframe}:${POSTGRES_PASSWORD:-freeframe}@postgres:5432/${POSTGRES_DB:-freeframe}
      - REDIS_URL=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      - S3_STORAGE=minio
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-freeframe}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: >
      sh -c "cd /workspace/apps/api && alembic upgrade head && cd /workspace &&
      gunicorn apps.api.main:app
      -w $${API_WORKERS:-4}
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    labels:
      - traefik.enable=true
      # HTTP router (always active)
      - traefik.http.routers.api.rule=PathPrefix(`/api`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.routers.api.middlewares=strip-api-prefix
      # HTTPS router (with static certs and CORS)
      - traefik.http.routers.api-secure.rule=PathPrefix(`/api`)
      - traefik.http.routers.api-secure.entrypoints=websecure
      - traefik.http.routers.api-secure.tls=true
      - traefik.http.routers.api-secure.middlewares=cors-headers,strip-api-prefix
      - traefik.http.routers.api-secure.service=api
      # CORS middleware
      - traefik.http.middlewares.cors-headers.headers.accesscontrolalloworigins=https://spotico.taifun.ai,http://localhost:3000
      - traefik.http.middlewares.cors-headers.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
      - traefik.http.middlewares.cors-headers.headers.accesscontrolallowheaders=*
      - traefik.http.middlewares.cors-headers.headers.accesscontrolexposeheaders=Content-Length,X-Total-Count
      - traefik.http.middlewares.cors-headers.headers.accesscontrolmaxage=86400
      - traefik.http.middlewares.cors-headers.headers.accesscontrolallowcredentials=true
      # Strip prefix
      - traefik.http.middlewares.strip-api-prefix.stripprefix.prefixes=/api
      - traefik.http.services.api.loadbalancer.server.port=8000
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-freeframe}:${POSTGRES_PASSWORD:-freeframe}@postgres:5432/${POSTGRES_DB:-freeframe}
      - REDIS_URL=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      - S3_STORAGE=minio
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-freeframe}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    command: sh -c "celery -A apps.api.tasks.celery_app worker -Q transcoding -c $${TRANSCODING_CONCURRENCY:-2} --loglevel=warning"
    restart: unless-stopped

  email_worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-freeframe}:${POSTGRES_PASSWORD:-freeframe}@postgres:5432/${POSTGRES_DB:-freeframe}
      - REDIS_URL=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      - S3_STORAGE=minio
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-freeframe}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
    depends_on:
      redis:
        condition: service_healthy
    command: sh -c "celery -A apps.api.tasks.celery_app worker -Q email_high,email_low -c $${EMAIL_CONCURRENCY:-2} --loglevel=warning"
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-freeframe}:${POSTGRES_PASSWORD:-freeframe}@postgres:5432/${POSTGRES_DB:-freeframe}
      - REDIS_URL=redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0
      - S3_STORAGE=minio
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-freeframe}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
    depends_on:
      redis:
        condition: service_healthy
    command: sh -c "celery -A apps.api.tasks.celery_app beat --loglevel=warning -s /tmp/celerybeat-schedule"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: /api
    env_file:
      - .env.prod
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      - traefik.enable=true
      # HTTP router (always active)
      - traefik.http.routers.web.rule=PathPrefix(`/`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.routers.web.priority=1
      # HTTPS router (with static certs)
      - traefik.http.routers.web-secure.rule=PathPrefix(`/`)
      - traefik.http.routers.web-secure.entrypoints=websecure
      - traefik.http.routers.web-secure.tls=true
      - traefik.http.routers.web-secure.priority=1
      - traefik.http.routers.web-secure.service=web
      - traefik.http.services.web.loadbalancer.server.port=3000
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
